<div class="home-shell">
  <bd-side-rail>
    <bd-icon-button
      class="home-shell__rail-menu"
      icon="menu"
      ariaLabel="Toggle navigation"
      (click)="onToggleNav()"
      data-testid="rail-menu"
    />
    <bd-nav-item label="Pages" icon="description" [active]="true" />
    <bd-nav-item label="Tags" icon="sell" />
    <bd-nav-item label="Recent" icon="schedule" />
    <bd-nav-item label="Settings" icon="settings" />
    <span class="home-shell__rail-spacer"></span>
    <div
      class="home-shell__rail-avatar"
      role="button"
      tabindex="0"
      aria-label="Account"
      data-testid="rail-avatar"
    ></div>
  </bd-side-rail>

  <bd-sidebar heading="Pages">
    <ng-container bdSidebarHeaderActions>
      <bd-icon-button
        icon="create_new_folder"
        ariaLabel="Add folder"
        (click)="onAddRootFolder()"
        data-testid="add-folder"
      />
      <bd-button
        variant="tonal"
        icon="add"
        ariaLabel="Add document"
        (click)="onAddRootDocument()"
        data-testid="add-document"
      >
        New
      </bd-button>
    </ng-container>

    <bd-text-field
      class="home-shell__search"
      type="search"
      placeholder="Search pages…"
      leadingIcon="search"
      [(value)]="searchQuery"
      data-testid="sidebar-search"
    />

    <div class="home-shell__chips" role="group" aria-label="Filter pages">
      <bd-chip
        [selected]="filter() === 'all'"
        (click)="filter.set('all')"
        data-testid="filter-all"
      >All</bd-chip>
      <bd-chip
        [selected]="filter() === 'facts'"
        (click)="filter.set('facts')"
        data-testid="filter-facts"
      >#facts</bd-chip>
      <bd-chip
        [selected]="filter() === 'wip'"
        (click)="filter.set('wip')"
        data-testid="filter-wip"
      >#wip</bd-chip>
    </div>

    <bd-page-tree
      [folders]="workspace().folders"
      [documents]="workspace().documents"
      [activeDocumentId]="focusedDocId()"
      (documentSelected)="onDocumentSelected($event)"
      data-testid="page-tree"
    />
  </bd-sidebar>

  <main class="home-shell__editor">
    <bd-top-app-bar
      [title]="editorTitle()"
      [leadingIcon]="null"
      decorativeIcon="description"
      [caption]="lastEditedCaption()"
      [actions]="topBarActions"
      (actionClick)="onTopBarAction($event)"
    >
      <bd-button
        bdTopAppBarTrailing
        variant="tonal"
        (click)="onSave()"
        data-testid="save-document"
      >
        Save
      </bd-button>
    </bd-top-app-bar>

    <bd-tab-bar
      [tabs]="leftTabs()"
      [activeIndex]="leftPane().activeIndex"
      [splitActive]="splitActive()"
      (tabSelected)="onLeftTabSelected($event)"
      (tabClosed)="onLeftTabClosed($event)"
      (splitToggled)="onSplitToggled()"
      data-testid="tab-bar-left"
    />

    @if (splitActive() && rightPane()) {
      <bd-tab-bar
        [tabs]="rightTabs()"
        [activeIndex]="rightPane()!.activeIndex"
        [canSplit]="false"
        (tabSelected)="onRightTabSelected($event)"
        (tabClosed)="onRightTabClosed($event)"
        data-testid="tab-bar-right"
      />
    }

    <bd-split-editor [split]="splitActive()">
      <bd-document-editor
        [lines]="leftLines()"
        [active]="focusedPaneIndex() === 0"
        (paneFocused)="onLeftPaneFocused()"
        (addRootSection)="onAddRootSection()"
        (sectionAction)="onSectionAction($event, 0)"
        (factAction)="onFactAction($event, 0)"
        data-testid="editor-left"
      />
      @if (splitActive()) {
        <bd-document-editor
          [lines]="rightLines()"
          [active]="focusedPaneIndex() === 1"
          (paneFocused)="onRightPaneFocused()"
          (addRootSection)="onAddRootSection()"
          (sectionAction)="onSectionAction($event, 1)"
          (factAction)="onFactAction($event, 1)"
          data-testid="editor-right"
        />
      }
    </bd-split-editor>

    <bd-status-bar
      [left]="statusLeft()"
      [right]="statusRight()"
      data-testid="status-bar"
    />
  </main>

  <aside class="home-shell__right-rail">
    <bd-outline
      [entries]="outlineEntries()"
      [activeId]="activeOutlineId()"
      (entryClick)="onOutlineClick($event)"
      data-testid="outline"
    />
    <hr class="home-shell__rail-divider" />
    <bd-backlinks [entries]="backlinks()" data-testid="backlinks" />
  </aside>
</div>
